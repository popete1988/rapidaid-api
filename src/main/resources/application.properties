server.port=${PORT:8080}
spring.application.name=rapidaid-api

# Cache configuration - results cached for 24 hours to reduce API calls
cache.disease.ttl-hours=24

# External API URLs
medlineplus.search.url=https://wsearch.nlm.nih.gov/ws/query
medlineplus.connect.url=https://connect.medlineplus.gov/application
mymemory.translate.url=https://api.mymemory.translated.net/get

# Logging
logging.level.com.rapidaid=INFO

# Gemini AI API key (fallback when disease not found in local JSON)

# Gemini API key — set as GEMINI_API_KEY environment variable in Render
